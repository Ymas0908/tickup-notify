services:
  tickup-notify:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: tickup-notify-app
    ports:
      - "9002:9002"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - JAVA_OPTS=-Xms512m -Xmx1024m
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9002/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - tickup-network
    volumes:
      - ./logs:/app/logs
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tickup-notify.rule=Host(`localhost`)"
      - "traefik.http.services.tickup-notify.loadbalancer.server.port=9002"

networks:
  tickup-network:
    driver: bridge

volumes:
  logs:
    driver: local
